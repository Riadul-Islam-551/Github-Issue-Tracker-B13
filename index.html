<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issue Tracker</title>
    <!-- external css  -->
    <link rel="stylesheet" href="./main.css" />
    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- tailwind and daisy ui  -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font awesome  -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body class="bg-base-200">
    <!-- login page  -->
    <div
      id="login-page"
      class="h-screen flex justify-center items-center bg-base-200"
    >
      <section class="w-11/12 md:w-[400px] p-5 bg-white rounded-2xl shadow-md">
        <div class="flex flex-col justify-center items-center space-y-2 mb-5">
          <img src="./assets/github-logo.png" alt="Github Logo" />
          <h1 class="font-bold text-xl md:text-2xl">GitHub Issues Tracker</h1>
          <h4 class="text-light text-sm md:text-lg">
            Sign in to manage your issues
          </h4>
        </div>
        <form
          id="login-form"
          class="fieldset border-base-300 rounded-box border p-4"
        >
          <label class="label text-neutral">User Name</label>
          <input
            id="user-input"
            type="text"
            class="input"
            placeholder="User Name"
          />
          <p class="text-primary">Default: admin</p>

          <label class="label text-neutral">Password</label>
          <input
            id="password-input"
            type="password"
            class="input"
            placeholder="Password"
          />
          <p class="text-primary">Default: admin123</p>

          <button id="login-btn" class="btn btn-primary mt-4" type="submit">
            Login
          </button>
        </form>
      </section>
    </div>
    <!-- main page  -->
    <div id="main-page" class="min-h-screen hidden">
      <!-- navigation section  -->
      <header>
        <nav class="w-full bg-white shadow-sm">
          <div
            class="navbar flex justify-between items-center py-5 max-w-[1200px] mx-auto"
          >
            <div class="flex justify-start items-center gap-2">
              <img width="40px" src="./assets/github-logo.png" alt="" />
              <h1 class="font-bold text-xl md:text-2xl">
                GitHub Issues Tracker
              </h1>
            </div>
            <div class="join">
              <div>
                <label class="input validator join-item">
                  <input id="input-search" type="text" />
                </label>
              </div>
              <button
                id="search-btn"
                class="btn btn-neutral join-item shadow-none"
              >
                Search
              </button>
            </div>
          </div>
        </nav>
      </header>
      <main class="max-w-[1200px] mx-auto px-2">
        <!-- category section  -->
        <section class="my-12 p-5 rounded-md bg-white space-x-3">
          <button id="all-button" class="btn btn-primary shadow-none">
            All
          </button>
          <button id="opened-button" class="btn shadow-none">Open</button>
          <button id="closed-button" class="btn shadow-none">Closed</button>
        </section>

        <!-- total issue section  -->
        <section
          class="flex justify-between items-center p-3 mb-5 bg-base-100 rounded-md"
        >
          <div class="flex justify-start items-center gap-2">
            <img
              class="bg-blue-100 p-2 rounded-full"
              src="./assets/Aperture.png"
              alt=""
            />
            <div>
              <h2 class="font-bold text-lg">50 Issues</h2>
              <p class="text-light text-sm">
                Track and manage your project issues
              </p>
            </div>
          </div>
          <div class="flex justify-center items-center gap-2">
            <div class="bg-success p-2 rounded-full"></div>
            <div class="mr-2"><p class="text-sm">Open</p></div>
            <div class="bg-purple-600 p-2 rounded-full"></div>
            <div><p class="text-sm">Closed</p></div>
          </div>
        </section>
        <!-- loading section  -->
        <section id="loading-issue" class="w-7 mx-auto my-10 hidden">
          <span class="loading loading-spinner text-primary"></span>
        </section>
        <section>
          <!-- Open the modal using ID.showModal() method -->
          <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
          <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
            <div class="modal-box">
              <div id="issue-details-modal"></div>
              <div class="modal-action">
                <form method="dialog">
                  <!-- if there is a button in form, it will close the modal -->
                  <button class="btn btn-primary outline-none">Close</button>
                </form>
              </div>
            </div>
          </dialog>
        </section>

        <!-- all issue section  -->
        <section
          id="all-issue"
          class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-4 py-10 rounded-md mb-10"
        >

        </section>
      </main>
    </div>
    <!-- scripts  -->
    <script src="./scripts/login.js"></script>
    <script src="./scripts/main.js"></script>
  </body>
</html>
