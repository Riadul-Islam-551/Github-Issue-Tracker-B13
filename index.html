<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issue Tracker</title>
    <!-- external css  -->
    <link rel="stylesheet" href="./main.css" />
    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- tailwind and daisy ui  -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="h-screen flex justify-center items-center bg-base-100">
    <section
      class="border w-11/12 md:w-[400px] p-5 bg-white rounded-2xl shadow-md"
    >
      <div class="flex flex-col justify-center items-center space-y-2 mb-5">
        <img src="./assets/github-logo.png" alt="Github Logo" />
        <h1 class="font-bold text-xl md:text-2xl">GitHub Iss ues Tracker</h1>
        <h4 class="text-light text-sm md:text-lg">
          Sign in to manage your issues
        </h4>
      </div>
      <form class="fieldset border-base-300 rounded-box border p-4">
        <label class="label text-neutral">User Name</label>
        <input type="email" class="input" placeholder="User Name" />
        <p class="text-primary">Default: admin</p>

        <label class="label text-neutral">Password</label>
        <input type="password" class="input" placeholder="Password" />
        <p class="text-primary">Default: admin123</p>

        <button class="btn btn-primary mt-4">Login</button>
      </form>
    </section>
  </body>
</html>
